#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[smells.similar_code]
enabled = false

[smells.file_complexity]
threshold = 200

[smells.return_statements]
threshold = 50

[smells.function_parameters]
threshold = 50

[smells.function_complexity]
threshold = 100

[smells.nested_control_flow]
threshold = 6

[[source]]
name = "default"
default = true

# Plugins disabled — use cargo-make tasks instead:
#   lint  → cargo clippy
#   fmt   → cargo fmt
#   qlty  → smells only (built-in, no external deps)
# 
# actionlint / trufflehog / zizmor / hadolint — not applicable to Rust.
# clippy / rustfmt — qlty's vendored Rust 1.77.2 fails to download on this network.
