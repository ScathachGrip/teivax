changelog:
  exclude:
    labels:
      - ignore
    authors:
      - github-actions[bot]
  categories:
    - title: "🚀 New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🧰 Maintenance"
      labels:
        - chore
        - ci
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "🏃 Other Changes"
      labels:
        - "*"