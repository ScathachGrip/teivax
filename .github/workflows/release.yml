name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true # Needed to push tags
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(grep -oP '^version = "\K[^"]+' Cargo.toml || echo "0.0.0")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Release Notes
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"* %s ([%h]($REPO_URL/commit/%H))" --no-merges)
            COMPARE_URL="$REPO_URL/commit/HEAD"
          else
            NOTES=$(git log --pretty=format:"* %s ([%h]($REPO_URL/commit/%H))" $PREV_TAG..HEAD --no-merges)
            COMPARE_URL="$REPO_URL/compare/$PREV_TAG...$TAG"
          fi
          # Handle multiline output safely for GITHUB_OUTPUT
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "compare_url=$COMPARE_URL" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.0.8
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.notes }}

            **Full Changelog**: ${{ steps.changelog.outputs.compare_url }}
          target_commitish: master
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
